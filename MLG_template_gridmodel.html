<!DOCTYPE html>
<html>
<head>
<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
}

/* Style the header */
.header {
  grid-area: header;
  background-color: #f1f1f1;
  padding: 30px;
  text-align: center;
  font-size: 35px;
}

/* grid container */
.grid-container {
  display: grid;
  grid-template-areas: 
    'header header header header header header' 
    'left middle middle middle middle right' 
    'footer footer footer footer footer footer';
  grid-column-gap: 10px; /*wenn ein Zwischenraum zwischen den Spalten gezeigt werden soll*/
} 

.left,
.middle,
.right {
  padding: 10px;
  height: 500px;
}

/* left column */
.left {
  grid-area: left;
}

/* middle column */
.middle {
  grid-area: middle;
}

/* right column */
.right {
  grid-area: right;
}

/* footer */
.footer {
  grid-area: footer;
  background-color: #f1f1f1;
  padding: 10px;
  text-align: center;
}

/* Responsive layout - makes the three columns stack on top of each other instead of next to each other 
@media (max-width: 600px) {
  .grid-container  {
    grid-template-areas: 
      'header header header header header header' 
      'left left left left left left' 
      'middle middle middle middle middle middle' 
      'right right right right right right' 
      'footer footer footer footer footer footer';
  }
}
*/

.gridmodell {
    display: grid;
    grid-template-columns: auto auto auto auto;
    grid-gap: 20px;
    width: 50%;
    margin: auto;
    background-color: black;
    padding: 1em;
}

.gridmodell div {
    background-color: red;
    border: 5px solid tomato;
    padding: 1em;
}

</style>
</head>
<body>

<h2>CSS Template mit Grid-Modell</h2>

<div class="grid-container">
  <div class="header">
    <h2>Header</h2>
  </div>
  
  <div class="left" style="background-color:#aaa;">Column</div>
  <div class="middle" style="background-color:#bbb;">Column</div>  
  <div class="right" style="background-color:#ccc;">Column</div>
  
  <div class="footer">
    <p>Footer</p>
  </div>
</div>

<hr>

<h1 style="text-align: center;">Grid-Modell</h1>
<div class="gridmodell">
  <div>1</div>
  <div>2</div>
  <div>3</div>
  <div>4</div>
  <div>1</div>
  <div>2</div>
  <div>3</div>
  <div>4</div>
  <div>1</div>
  <div>2</div>
  <div>3</div>
  <div>4</div>
</div>



</body>
</html>
